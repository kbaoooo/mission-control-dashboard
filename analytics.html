<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Telemetry Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b0f17;
  color: #cbd5f5;
  overflow: hidden;
}

/* HEADER */
.header {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid #1f2937;
}

.logo { font-weight: 800; color: #38bdf8; }

.nav-tabs { display: flex; gap: 10px; }

.nav-link {
  color: #9ca3af;
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 4px;
}

.nav-link.active {
  color: #3b82f6;
  background: rgba(59,130,246,0.1);
}

.nav-link:hover { background: #1f2937; }

.status { font-size: 12px; color: #22c55e; }

/* MODE BUTTON */
.mode-box { display: flex; gap: 5px; }

button {
  background: #1f2937;
  border: none;
  color: #cbd5f5;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 11px;
}

button:hover { background: #374151; }

/* MAIN */
.container {
  height: calc(100vh - 70px);
  display: flex;
  flex-direction: column;
}

.card {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #111827;
  border-top: 1px solid #1f2937;
  padding: 10px;
}

.card:first-child {
  border-bottom: 1px solid #1f2937;
}

.card h3 {
  margin: 0 0 5px 0;
  font-size: 12px;
  color: #9ca3af;
}

.canvas-wrapper {
  flex: 1;
  position: relative;
}

.canvas-wrapper canvas {
  position: absolute;
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">▲ VINSPACE MISSION CONTROL</div>

  <nav class="nav-tabs">
    <a href="index.html" class="nav-link">📡 TRACKING MAP</a>
    <a href="analytics.html" class="nav-link active">📊 TELEMETRY CHART</a>
    <a href="commands.html" class="nav-link">⚙️ COMMAND & PASSES</a>
  </nav>

  <!-- MODE SWITCH -->
  <div class="mode-box">
    <button onclick="setMode('minute')">1m</button>
    <button onclick="setMode('hour')">1h</button>
    <button onclick="setMode('day')">1d</button>
    <button onclick="setMode('week')">1w</button>
  </div>

  <div class="status">🟢 TRẠM VINUNIVERSITY GS-1: KẾT NỐI ỔN ĐỊNH</div>
</header>

<div class="container">

  <div class="card">
    <h3>🔋 BATTERY VOLTAGE</h3>
    <div class="canvas-wrapper">
      <canvas id="batteryChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>🌡 TEMPERATURE</h3>
    <div class="canvas-wrapper">
      <canvas id="tempChart"></canvas>
    </div>
  </div>

</div>

<script>
// ================= SAT BEHAVIOR =================
const sats = Array.from({ length: 8 }, (_, i) => ({
  name: "SAT-" + (i + 1),
  color: `hsl(${i * 36}, 80%, 60%)`,
  base: 3 + Math.random(),
  noise: 0.5 + Math.random(),
  dropChance: 0.01 + Math.random() * 0.02,
  anomalyChance: 0.05
}));

// ================= MODE =================
let mode = "day";
const modeConfig = {
  minute: 60,
  hour: 120,
  day: 200,
  week: 300
};

// ================= DATASET =================
function createDatasets() {
  return sats.map(s => ({
    label: s.name,
    borderColor: s.color,
    data: [],
    borderWidth: 1,
    pointRadius: 0,
    tension: 0
  }));
}

// ================= CHART =================
function createChart(id, min, max, unit) {
  return new Chart(document.getElementById(id), {
    type: "line",
    data: { labels: [], datasets: createDatasets() },
    options: {
      animation: false,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#cbd5f5" } } },
      scales: {
        y: {
          min, max,
          grid: { color: "#1f2937" },
          ticks: {
            color: "#94a3b8",
            callback: v => v + " " + unit
          }
        },
        x: { grid: { color: "#111827" }, ticks: { display: false } }
      }
    }
  });
}

const batteryChart = createChart("batteryChart", 0, 5, "V");
const tempChart = createChart("tempChart", 20, 90, "°C");

// ================= VALUE ENGINE =================
function generateValue(sat, min, max, type) {

  let val = sat.base + (Math.random() - 0.5) * sat.noise;

  // battery drop
  if (Math.random() < sat.dropChance && type === "battery") {
    val = Math.random() * 0.3;
  }

  // anomaly
  if (Math.random() < sat.anomalyChance) {
    val = Math.random() * (max - min) + min;
  }

  return Math.max(min, Math.min(max, val)).toFixed(2);
}

// ================= INITIAL HISTORY =================
function generateHistory(chart, min, max, type) {

  const points = modeConfig[mode];
  chart.data.labels = [];

  chart.data.datasets.forEach(ds => ds.data = []);

  for (let i = 0; i < points; i++) {
    chart.data.labels.push("");

    chart.data.datasets.forEach((ds, idx) => {
      ds.data.push(generateValue(sats[idx], min, max, type));
    });
  }

  chart.update();
}

// ================= UPDATE =================
function updateChart(chart, min, max, type) {

  chart.data.labels.push("");

  chart.data.datasets.forEach((ds, idx) => {
    ds.data.push(generateValue(sats[idx], min, max, type));
  });

  if (chart.data.labels.length > modeConfig[mode]) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(ds => ds.data.shift());
  }

  chart.update("none");
}

// ================= MODE SWITCH =================
function setMode(m) {
  mode = m;
  initAll();
}

// ================= INIT =================
function initAll() {
  generateHistory(batteryChart, 0, 5, "battery");
  generateHistory(tempChart, 20, 90, "temp");
}

// ================= LOOP =================
setInterval(() => {
  updateChart(batteryChart, 0, 5, "battery");
  updateChart(tempChart, 20, 90, "temp");
}, 1200);

initAll();
</script>

</body>
</html>
