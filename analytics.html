<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Telemetry Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg: #090d14;
  --surface: #101722;
  --surface-2: #151f2d;
  --line: rgba(148, 163, 184, 0.16);
  --line-strong: rgba(148, 163, 184, 0.28);
  --text: #eef4ff;
  --muted: #91a2b8;
  --blue: #3b82f6;
  --green: #10b981;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #0b111b 0%, var(--bg) 100%);
  color: #cbd5f5;
  overflow: hidden;
}

.header {
  min-height: 58px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 10px 18px;
  padding: 0 18px;
  background: rgba(10, 16, 25, 0.92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(14px);
}

.logo {
  color: #f8fbff;
  flex: 0 0 auto;
  font-size: 16px;
  font-weight: 800;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.nav-tabs {
  display: flex;
  flex: 1 1 360px;
  justify-content: center;
  gap: 8px;
  min-width: 0;
}

.nav-link {
  color: var(--muted);
  text-decoration: none;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.04em;
  padding: 9px 13px;
  border-radius: 8px;
  border: 1px solid transparent;
  white-space: nowrap;
}

.nav-link.active {
  color: #f8fbff;
  background: rgba(59, 130, 246, 0.14);
  border-color: rgba(59, 130, 246, 0.42);
}

.nav-link:hover:not(.active) {
  color: var(--text);
  background: rgba(148, 163, 184, 0.09);
  border-color: rgba(148, 163, 184, 0.16);
}

.status {
  display: inline-flex;
  flex: 0 1 auto;
  align-items: center;
  gap: 9px;
  color: #dbeafe;
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
}

.status::before {
  content: "";
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: var(--green);
  box-shadow: 0 0 18px rgba(16, 185, 129, 0.75);
  flex: 0 0 auto;
}

.mode-box {
  display: flex;
  flex: 0 0 auto;
  gap: 6px;
  padding: 3px;
  background: rgba(15, 23, 42, 0.8);
  border: 1px solid var(--line);
  border-radius: 8px;
}

button {
  min-width: 40px;
  height: 28px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 6px;
  color: #cbd5f5;
  cursor: pointer;
  font-size: 12px;
  font-weight: 800;
}

button:hover {
  background: rgba(59, 130, 246, 0.14);
  border-color: rgba(59, 130, 246, 0.32);
}

.container {
  height: calc(100vh - 58px);
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 16px;
}

.card {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, rgba(18, 27, 40, 0.96), rgba(12, 18, 29, 0.98));
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
  box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
}

.card h3 {
  margin: 0 0 12px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.08em;
}

.canvas-wrapper {
  flex: 1;
  min-height: 0;
  position: relative;
  background: #0a101a;
  border: 1px solid rgba(148, 163, 184, 0.1);
  border-radius: 8px;
  padding: 8px;
}

.canvas-wrapper canvas {
  position: absolute;
  inset: 8px;
  width: calc(100% - 16px) !important;
  height: calc(100% - 16px) !important;
}

@media (max-width: 1180px) {
  .header {
    height: auto;
    padding: 12px 16px;
  }

  .container {
    height: calc(100vh - 164px);
  }

  .logo,
  .status,
  .nav-tabs,
  .mode-box {
    justify-content: center;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">VINSPACE MISSION CONTROL</div>

  <nav class="nav-tabs">
    <a href="index.html" class="nav-link">TRACKING</a>
    <a href="analytics.html" class="nav-link active">TELEMETRY</a>
    <a href="commands.html" class="nav-link">COMMAND</a>
  </nav>

  <!-- MODE SWITCH -->
  <div class="mode-box">
    <button onclick="setMode('minute')">1m</button>
    <button onclick="setMode('hour')">1h</button>
    <button onclick="setMode('day')">1d</button>
    <button onclick="setMode('week')">1w</button>
  </div>

  <div class="status">VINUNIVERSITY GS-1: LINK STABLE</div>
</header>

<div class="container">

  <div class="card">
    <h3>POWER BUS VOLTAGE</h3>
    <div class="canvas-wrapper">
      <canvas id="batteryChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>THERMAL SENSOR ARRAY</h3>
    <div class="canvas-wrapper">
      <canvas id="tempChart"></canvas>
    </div>
  </div>

</div>

<script>
// ================= SAT BEHAVIOR =================
const satelliteColors = ["#10b981", "#ef4444", "#06b6d4", "#f59e0b", "#a855f7", "#3b82f6", "#ec4899", "#14b8a6"];
const sats = Array.from({ length: 8 }, (_, i) => ({
  name: "SAT-" + (i + 1),
  color: satelliteColors[i],
  base: 3 + Math.random(),
  noise: 0.5 + Math.random(),
  dropChance: 0.01 + Math.random() * 0.02,
  anomalyChance: 0.05
}));

// ================= MODE =================
let mode = "day";
const modeConfig = {
  minute: 60,
  hour: 120,
  day: 200,
  week: 300
};

// ================= DATASET =================
function createDatasets() {
  return sats.map((s, index) => ({
    label: s.name,
    borderColor: s.color,
    backgroundColor: s.color,
    data: [],
    borderWidth: 1.6,
    pointRadius: 0,
    tension: 0.28,
    hidden: index >= 4
  }));
}

// ================= CHART =================
function createChart(id, min, max, unit) {
  return new Chart(document.getElementById(id), {
    type: "line",
    data: { labels: [], datasets: createDatasets() },
    options: {
      animation: false,
      maintainAspectRatio: false,
      interaction: { mode: "nearest", intersect: false },
      plugins: {
        legend: {
          align: "center",
          labels: {
            color: "#cbd5f5",
            boxWidth: 28,
            boxHeight: 2,
            padding: 18,
            font: { size: 12, weight: "700" }
          }
        }
      },
      scales: {
        y: {
          min, max,
          border: { color: "rgba(148, 163, 184, 0.18)" },
          grid: { color: "rgba(148, 163, 184, 0.12)" },
          ticks: {
            color: "#94a3b8",
            callback: v => v + " " + unit
          }
        },
        x: {
          border: { color: "rgba(148, 163, 184, 0.12)" },
          grid: { color: "rgba(148, 163, 184, 0.06)" },
          ticks: { display: false }
        }
      }
    }
  });
}

const batteryChart = createChart("batteryChart", 0, 5, "V");
const tempChart = createChart("tempChart", 20, 90, "°C");

// ================= VALUE ENGINE =================
function generateValue(sat, min, max, type) {

  let val = sat.base + (Math.random() - 0.5) * sat.noise;

  // battery drop
  if (Math.random() < sat.dropChance && type === "battery") {
    val = Math.random() * 0.3;
  }

  // anomaly
  if (Math.random() < sat.anomalyChance) {
    val = Math.random() * (max - min) + min;
  }

  return Math.max(min, Math.min(max, val)).toFixed(2);
}

// ================= INITIAL HISTORY =================
function generateHistory(chart, min, max, type) {

  const points = modeConfig[mode];
  chart.data.labels = [];

  chart.data.datasets.forEach(ds => ds.data = []);

  for (let i = 0; i < points; i++) {
    chart.data.labels.push("");

    chart.data.datasets.forEach((ds, idx) => {
      ds.data.push(generateValue(sats[idx], min, max, type));
    });
  }

  chart.update();
}

// ================= UPDATE =================
function updateChart(chart, min, max, type) {

  chart.data.labels.push("");

  chart.data.datasets.forEach((ds, idx) => {
    ds.data.push(generateValue(sats[idx], min, max, type));
  });

  if (chart.data.labels.length > modeConfig[mode]) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(ds => ds.data.shift());
  }

  chart.update("none");
}

// ================= MODE SWITCH =================
function setMode(m) {
  mode = m;
  initAll();
}

// ================= INIT =================
function initAll() {
  generateHistory(batteryChart, 0, 5, "battery");
  generateHistory(tempChart, 20, 90, "temp");
}

// ================= LOOP =================
setInterval(() => {
  updateChart(batteryChart, 0, 5, "battery");
  updateChart(tempChart, 20, 90, "temp");
}, 1200);

initAll();
</script>

</body>
</html>
