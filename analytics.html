<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Telemetry Dashboard</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b0f17;
  color: #cbd5f5;
  overflow: hidden; /* 🔥 no scroll */
}

/* HEADER */
.header {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid #1f2937;
}

.logo {
  font-weight: 800;
  color: #38bdf8;
}

.nav-tabs {
  display: flex;
  gap: 10px;
}

.nav-link {
  color: #9ca3af;
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 4px;
}

.nav-link.active {
  color: #3b82f6;
  background: rgba(59,130,246,0.1);
}

.nav-link:hover {
  background: #1f2937;
}

.status {
  font-size: 12px;
  color: #22c55e;
}

/* MAIN LAYOUT */
.container {
  height: calc(100vh - 70px);
  display: flex;
  flex-direction: column;
}

/* mỗi chart chiếm 50% */
.card {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #111827;
  border-top: 1px solid #1f2937;
  padding: 10px;
}

/* phân cách 2 chart */
.card:first-child {
  border-bottom: 1px solid #1f2937;
}

/* title */
.card h3 {
  margin: 0 0 5px 0;
  font-size: 12px;
  color: #9ca3af;
}

/* wrapper giữ kích thước */
.canvas-wrapper {
  flex: 1;
  position: relative;
}

/* canvas fill 100% */
.canvas-wrapper canvas {
  position: absolute;
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">▲ VINSPACE MISSION CONTROL</div>
  
  <nav class="nav-tabs">
    <a href="index.html" class="nav-link">📡 TRACKING MAP</a>
    <a href="analytics.html" class="nav-link active">📊 TELEMETRY CHART</a>
    <a href="commands.html" class="nav-link">⚙️ COMMAND & PASSES</a>
  </nav>

  <div class="status">🟢 TRẠM VINUNIVERSITY GS-1: KẾT NỐI ỔN ĐỊNH</div>
</header>

<div class="container">

  <!-- BATTERY -->
  <div class="card">
    <h3>🔋 BATTERY VOLTAGE</h3>
    <div class="canvas-wrapper">
      <canvas id="batteryChart"></canvas>
    </div>
  </div>

  <!-- TEMPERATURE -->
  <div class="card">
    <h3>🌡 TEMPERATURE</h3>
    <div class="canvas-wrapper">
      <canvas id="tempChart"></canvas>
    </div>
  </div>

</div>

<script>
// =======================
// SATELLITES
// =======================
const sats = [
  { name: "VINSAT-1", color: "#4ade80" },
  { name: "VINSAT-2", color: "#facc15" },
  { name: "VINSAT-3", color: "#60a5fa" },
  { name: "VINSAT-4", color: "#f97316" },
  { name: "VINSAT-5", color: "#f97316" },
  { name: "VINSAT-6", color: "#f97316" },
  { name: "VINSAT-7", color: "#f97316" },
  { name: "VINSAT-8", color: "#f97316" },
  { name: "VINSAT-9", color: "#f97316" },
  { name: "VINSAT-10", color: "#f97316" }
];

function createDatasets() {
  return sats.map(s => ({
    label: s.name,
    borderColor: s.color,
    data: [],
    borderWidth: 1.2,
    pointRadius: 0,
    tension: 0 // 🔥 giống grafana
  }));
}

// =======================
// INIT CHART
// =======================
const batteryChart = new Chart(
  document.getElementById("batteryChart"),
  {
    type: "line",
    data: { labels: [], datasets: createDatasets() },
    options: {
      animation: false,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: "#cbd5f5" } }
      },
      scales: {
        y: {
          min: 0,
          max: 5,
          grid: { color: "#1f2937" },
          ticks: {
            color: "#94a3b8",
            callback: v => v + " V"
          }
        },
        x: {
          grid: { color: "#111827" },
          ticks: { display: false }
        }
      }
    }
  }
);

const tempChart = new Chart(
  document.getElementById("tempChart"),
  {
    type: "line",
    data: { labels: [], datasets: createDatasets() },
    options: {
      animation: false,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: "#cbd5f5" } }
      },
      scales: {
        y: {
          min: 20,
          max: 90,
          grid: { color: "#1f2937" },
          ticks: {
            color: "#94a3b8",
            callback: v => v + "°C"
          }
        },
        x: {
          grid: { color: "#111827" },
          ticks: { display: false }
        }
      }
    }
  }
);

// preload dữ liệu 1 ngày
generateHistory(batteryChart, 2.5, 5);
generateHistory(tempChart, 30, 80);

// =======================
// NOISY DATA (GIỐNG ẢNH)
// =======================
function noisy(min, max) {
  let val = Math.random() * (max - min) + min;

  // spike mạnh kiểu telemetry thật
  if (Math.random() < 0.15) {
    val = Math.random() * (max - min);
  }

  return val.toFixed(2);
}

function updateChart(chart, min, max) {

  chart.data.labels.push("");

  chart.data.datasets.forEach(ds => {
    ds.data.push(noisy(min, max));
  });

  if (chart.data.labels.length > 100) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(ds => ds.data.shift());
  }

  chart.update("none");
}

// LOOP
setInterval(() => {
  updateChart(batteryChart, 2.5, 5);
  updateChart(tempChart, 30, 80);
}, 300);

  function generateHistory(chart, min, max) {

  for (let i = 0; i < 120; i++) {  // ~120 points = fake 1 ngày

    chart.data.labels.push("");

    chart.data.datasets.forEach(ds => {
      ds.data.push(noisy(min, max));
    });

  }

  chart.update();
}
  
</script>

</body>
</html>
